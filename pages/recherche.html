<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche — Auto-flotte</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/styles.css">
<style>
  .res-row { display:flex; align-items:center; gap:.7rem; padding:.6rem .8rem; border:1px solid var(--fp-border); border-radius:.6rem; background:#fff; text-decoration:none; color:inherit; transition:all .12s; }
  .res-row:hover { border-color: var(--fp-accent); box-shadow:0 8px 20px -12px rgba(15,30,61,.25); transform:translateY(-1px); }
  .res-ico { width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff; }
  .grp-title { font-weight:700; color:var(--fp-primary); display:flex; align-items:center; gap:.5rem; margin:1.4rem 0 .6rem; }
  mark { background:#FEF08A; color:inherit; padding:0 1px; border-radius:2px; }
</style>
<script>
(function(){
  var remember = localStorage.getItem('fp_remember_me') === '1';
  var alive = sessionStorage.getItem('fp_session_alive') === '1';
  if (!remember && !alive) { localStorage.removeItem('sb-tzjuptlzoywjeigmyfuj-auth-token'); }
  sessionStorage.setItem('fp_session_alive', '1');
  var loginPath = window.location.pathname.indexOf('/pages/') !== -1 ? '../login.html' : 'login.html';
  var t; try { t = JSON.parse(localStorage.getItem('sb-tzjuptlzoywjeigmyfuj-auth-token')); } catch(e) {}
  if (!t || !t.access_token) { window.location.replace(loginPath); document.documentElement.style.display = 'none'; }
})();
</script>
</head>
<body class="bg-slate-50">

<div class="flex min-h-screen flex-col md:flex-row">

  <aside class="fp-sidebar p-4 flex-shrink-0">
    <a href="../index.html" class="fp-logo text-white text-lg mb-8 px-2">
      <span class="fp-logo-mark">AF</span><span>Auto-flotte</span>
    </a>
    <nav class="space-y-1">
      <a href="recherche.html"    data-nav="recherche.html"><i data-lucide="search"></i> Recherche</a>
      <a href="../dashboard.html" data-nav="dashboard.html"><i data-lucide="layout-dashboard"></i> Tableau de bord</a>
      <a href="notifications.html" data-nav="notifications.html"><i data-lucide="bell"></i> Notifications</a>
      <a href="statistiques.html" data-nav="statistiques.html"><i data-lucide="bar-chart-3"></i> Statistiques</a>
      <a href="vehicules.html"    data-nav="vehicules.html"><i data-lucide="car"></i> Véhicules</a>
      <a href="emprunts.html"     data-nav="emprunts.html"><i data-lucide="key-round"></i> Emprunt véhicule</a>
      <a href="conducteurs.html"  data-nav="conducteurs.html"><i data-lucide="users"></i> Conducteurs</a>
      <a href="amendes.html"      data-nav="amendes.html"><i data-lucide="ticket"></i> Amendes</a>
      <a href="sinistres.html"    data-nav="sinistres.html"><i data-lucide="alert-octagon"></i> Sinistres</a>
      <a href="a-vendre.html"     data-nav="a-vendre.html"><i data-lucide="tag"></i> À vendre</a>
      <a href="factures.html"     data-nav="factures.html"><i data-lucide="receipt"></i> Factures</a>
      <a href="entretiens.html"   data-nav="entretiens.html"><i data-lucide="wrench"></i> Entretiens</a>
      <a href="contrats.html"     data-nav="contrats.html"><i data-lucide="file-text"></i> Contrats</a>
      <a href="guide.html"        data-nav="guide.html"><i data-lucide="book-open"></i> Guide</a>
      <a href="parametres.html"   data-nav="parametres.html"><i data-lucide="settings"></i> Paramètres</a>
    </nav>
  </aside>

  <main class="flex-1 p-6 md:p-10 max-w-4xl">
    <div class="mb-6">
      <h1 class="text-2xl font-extrabold" style="color: var(--fp-primary)">Recherche globale</h1>
      <p class="text-slate-500 text-sm mt-1">Cherche partout d'un coup : véhicules, conducteurs, amendes, factures.</p>
    </div>

    <div class="relative mb-6">
      <i data-lucide="search" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
      <input id="q" type="text" autofocus placeholder="Plaque, nom, n° d'avis, fournisseur, modèle…"
        class="w-full pl-12 pr-4 py-3 text-base border border-slate-200 rounded-xl focus:outline-none focus:border-teal-500 shadow-sm" />
    </div>

    <div id="results"></div>
  </main>
</div>

<script src="../assets/js/vendor/supabase.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
  lucide.createIcons();
  const data = window.FP_DATA;
  const $ = (id) => document.getElementById(id);
  const esc = (s) => (s ?? '').toString().replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const norm = (s) => (s ?? '').toString().toLowerCase();

  function highlight(text, q) {
    const s = esc(text);
    if (!q) return s;
    try { return s.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig'), '<mark>$1</mark>'); }
    catch (e) { return s; }
  }

  function search(q) {
    const box = $('results');
    const ql = norm(q).trim();
    if (ql.length < 1) { box.innerHTML = '<p class="text-slate-400 text-sm">Tape au moins une lettre pour chercher.</p>'; return; }

    // Véhicules
    const veh = (data.vehicules || []).filter(v =>
      norm(`${v.immat} ${v.marque} ${v.modele} ${v.chauffeur} ${v.vin}`).includes(ql));
    // Conducteurs (noms uniques depuis véhicules + amendes)
    const noms = new Set();
    (data.vehicules || []).forEach(v => { const c = (v.chauffeur || '').trim(); if (c && c !== '—') noms.add(c); });
    (data.amendes || []).forEach(a => { if (a.prenom) noms.add(a.prenom.trim()); });
    const conducteurs = [...noms].filter(n => norm(n).includes(ql)).sort((a, b) => a.localeCompare(b, 'fr'));
    // Amendes
    const am = (data.amendes || []).filter(a =>
      norm(`${a.prenom} ${a.motif} ${a.numeroAvis} ${a.numeroTelepaiement}`).includes(ql));
    // Factures
    const fac = (data.factures || []).filter(f =>
      norm(`${f.vehiculeImmat} ${f.fournisseur} ${f.numeroFacture} ${f.description} ${f.type}`).includes(ql));

    const total = veh.length + conducteurs.length + am.length + fac.length;
    let html = `<p class="text-xs text-slate-500 mb-2">${total} résultat${total > 1 ? 's' : ''} pour « ${esc(q)} »</p>`;

    const row = (href, color, icon, title, sub) => `
      <a href="${href}" class="res-row mb-2">
        <span class="res-ico" style="background:${color}"><i data-lucide="${icon}" class="w-4 h-4"></i></span>
        <span class="min-w-0 flex-1">
          <span class="block font-semibold text-slate-900 truncate">${title}</span>
          <span class="block text-xs text-slate-500 truncate">${sub}</span>
        </span>
        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 flex-shrink-0"></i>
      </a>`;

    const grp = (icon, label, n) => `<div class="grp-title"><i data-lucide="${icon}" class="w-5 h-5"></i> ${label} <span class="text-slate-400 font-normal">(${n})</span></div>`;

    if (veh.length) {
      html += grp('car', 'Véhicules', veh.length);
      html += veh.slice(0, 25).map(v => row(`vehicules.html?veh=${encodeURIComponent(v.id)}`, '#0F766E', 'car',
        `${highlight(v.immat, q)} — ${highlight((v.marque || '') + ' ' + (v.modele || ''), q)}`,
        `${v.chauffeur && v.chauffeur !== '—' ? highlight(v.chauffeur, q) : 'Sans conducteur'} · ${esc(v.statut || '')}`)).join('');
    }
    if (conducteurs.length) {
      html += grp('users', 'Conducteurs', conducteurs.length);
      html += conducteurs.slice(0, 25).map(n => row('conducteurs.html', '#7C3AED', 'user',
        highlight(n, q), 'Voir la fiche conducteur')).join('');
    }
    if (am.length) {
      html += grp('ticket', 'Amendes', am.length);
      html += am.slice(0, 25).map(a => row('amendes.html', '#DC2626', 'ticket',
        `${highlight(a.prenom || '—', q)} — ${highlight(a.motif || 'Amende', q)}`,
        `${FP.date(a.date)} · ${a.montant ? FP.euroPrecis(a.montant) : '—'}${a.numeroAvis ? ' · avis ' + highlight(a.numeroAvis, q) : ''}`)).join('');
    }
    if (fac.length) {
      html += grp('receipt', 'Factures', fac.length);
      html += fac.slice(0, 25).map(f => row('factures.html', '#1E3A8A', 'receipt',
        `${highlight(f.vehiculeImmat || '—', q)} — ${highlight(f.fournisseur || f.type || 'Facture', q)}`,
        `${FP.date(f.date)} · ${f.montantTTC ? FP.euroPrecis(f.montantTTC) : '—'}`)).join('');
    }
    if (!total) html += '<p class="text-slate-400 text-sm mt-4">Aucun résultat. Essaie un autre mot (plaque, nom, n° d\'avis…).</p>';

    box.innerHTML = html;
    if (window.lucide) lucide.createIcons();
  }

  $('q').addEventListener('input', (e) => search(e.target.value));
  document.addEventListener('fp:data-ready', () => search($('q').value));
  search('');
</script>
</body>
</html>
