<script>
(function(){
  var remember = localStorage.getItem('fp_remember_me') === '1';
  var alive = sessionStorage.getItem('fp_session_alive') === '1';
  if (!remember && !alive) { localStorage.removeItem('sb-tzjuptlzoywjeigmyfuj-auth-token'); }
  sessionStorage.setItem('fp_session_alive', '1');
  var loginPath = window.location.pathname.indexOf('/pages/') !== -1 ? '../login.html' : 'login.html';
  var t; try { t = JSON.parse(localStorage.getItem('sb-tzjuptlzoywjeigmyfuj-auth-token')); } catch(e) {}
  if (!t || !t.access_token || (t.expires_at && t.expires_at * 1000 < Date.now())) { window.location.replace(loginPath); document.documentElement.style.display = 'none'; }
})();

    <script>/* Sidebar : reconstruit la barre dans son état final AVANT le 1er affichage
       (barre de recherche, ordre, visibilité, libellés perso, onglet actif). Sinon le JS
       fait tout ça APRÈS l'affichage → le menu "saute"/clignote. Autonome (localStorage). */
    (function(){try{
      var soc=(localStorage.getItem('fp_societe')||'PXP');if(soc==='__all__')soc='PXP';
      var raw=localStorage.getItem('auto_flotte_settings_'+soc);
      if(raw==null&&soc==='PXP')raw=localStorage.getItem('auto_flotte_settings');
      var s=raw?(JSON.parse(raw)||{}):{};
      var sb=document.querySelector('.fp-sidebar');if(!sb)return;
      var nav=sb.querySelector('nav');if(!nav)return;
      if(!sb.querySelector('.fp-global-search')){
        var w=document.createElement('div');w.className='fp-global-search';
        w.innerHTML='<div style="position: relative"><span style="position:absolute; left:.65rem; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.5); font-size:.85rem">\u{1F50D}</span><input type="text" class="fp-search-input" placeholder="Rechercher..." /></div><div class="fp-search-results"></div>';
        sb.insertBefore(w,nav);
      }
      var links=[].slice.call(nav.querySelectorAll('a[data-nav]'));if(!links.length)return;
      if(Array.isArray(s.navOrder)&&s.navOrder.length){
        var by={};links.forEach(function(a){by[a.dataset.nav]=a;});var ord=[];
        s.navOrder.forEach(function(k){if(by[k]){ord.push(by[k]);delete by[k];}});
        links.forEach(function(a){if(by[a.dataset.nav])ord.push(a);});
        ord.forEach(function(a){nav.appendChild(a);});}
      if(Array.isArray(s.navHidden)){var h={};s.navHidden.forEach(function(k){h[k]=1;});
        links.forEach(function(a){if(h[a.dataset.nav]&&a.dataset.nav!=='parametres.html')a.style.display='none';});}
      var lb=s.sidebarLabels||{};
      links.forEach(function(a){var t=lb[a.dataset.nav];if(!t)return;
        for(var i=0;i<a.childNodes.length;i++){var n=a.childNodes[i];if(n.nodeType===3&&n.textContent.trim()){n.textContent=' '+t;break;}}});
      var path=(location.pathname.split('/').pop()||'index').replace(/\.html$/,'');
      links.forEach(function(a){if((a.dataset.nav||'').replace(/\.html$/,'')===path)a.classList.add('active');});
    }catch(e){}})();</script>

<script>
  lucide.createIcons();
  const data = window.FP_DATA;

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

  function notifHTML(a) {
    const icon = a.niveau === 'danger' ? 'alert-triangle' : a.niveau === 'warn' ? 'bell' : 'info';
    const color = a.niveau === 'danger' ? 'text-red-600' : a.niveau === 'warn' ? 'text-amber-600' : 'text-blue-600';
    const tag = a.target ? 'a' : 'div';
    const href = a.target ? ` href="${esc(a.target)}"` : '';
    const arrow = a.target ? '<i data-lucide="chevron-right" class="w-4 h-4 text-slate-400 flex-shrink-0 self-center"></i>' : '';
    const card = `<${tag}${href} class="notif lvl-${a.niveau}">
      <i data-lucide="${icon}" class="w-5 h-5 ${color} flex-shrink-0 mt-0.5"></i>
      <div class="flex-1 min-w-0">
        ${a.categorie ? `<div class="notif-cat">${esc(a.categorie)}</div>` : ''}
        <div class="font-semibold text-slate-900">${esc(a.message)}</div>
        ${a.detail ? `<div class="text-sm text-slate-500 mt-0.5">${esc(a.detail)}</div>` : ''}
        ${a.vehicules && a.vehicules.length ? `<details class="mt-2">
          <summary class="text-xs font-semibold cursor-pointer" style="color:var(--fp-accent)">Voir les ${a.vehicules.length} véhicules</summary>
          <div class="mt-1 space-y-1">${a.vehicules.map(x => `<a href="${esc(x.target)}" class="block text-xs text-slate-600 hover:text-slate-900 hover:underline">• ${esc(x.label)}</a>`).join('')}</div>
        </details>` : ''}
      </div>
      ${arrow}
    </${tag}>`;
    // Alerte liée à un véhicule/échéance → bouton « Ignorer » visible (en haut à droite, hors du lien)
    if (!a.muteKey) return card;
    return `<div style="position:relative">${card}
      <button type="button" data-mute="${esc(a.muteKey)}" title="Ignorer cette alerte (ne plus l'afficher)" class="hover:text-red-600 hover:border-red-200 hover:bg-red-50" style="position:absolute;top:8px;right:8px;z-index:2;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:700;background:#fff;color:#64748b;border:1px solid var(--fp-border);cursor:pointer"><i data-lucide="bell-off" class="w-3.5 h-3.5"></i> Ignorer</button>
    </div>`;
  }

  function renderMasquees() {
    const box = document.getElementById('notif-masquees');
    const keys = (FP.alertes && FP.alertes.masquees()) || [];
    if (!keys.length) { box.innerHTML = ''; return; }
    const labels = (FP.alertes && FP.alertes.infos()) || {};
    box.innerHTML = `<details class="card p-4">
      <summary class="cursor-pointer font-semibold text-slate-700 flex items-center gap-2"><i data-lucide="bell-off" class="w-4 h-4 text-slate-400"></i> ${keys.length} alerte${keys.length > 1 ? 's' : ''} masquée${keys.length > 1 ? 's' : ''} <span class="text-xs font-normal text-slate-400">(cliquer pour gérer)</span></summary>
      <div class="mt-3 space-y-1.5">
        ${keys.map(k => `<div class="flex items-center justify-between gap-3 text-sm">
          <span class="text-slate-600 truncate">${esc(labels[k] || k)}</span>
          <button type="button" data-unmute="${esc(k)}" class="text-xs font-semibold shrink-0" style="color:var(--fp-accent)">Réafficher</button>
        </div>`).join('')}
        <button type="button" id="unmute-all" class="btn btn-outline text-xs mt-2">Tout réafficher</button>
      </div>
    </details>`;
    lucide.createIcons();
  }

  // Catégories déjà couvertes par une colonne dédiée (le reste tombe dans « Autres » → jamais perdu).
  const CLAIMED = new Set(['Amendes', 'Contrôle technique', 'Anti-pollution', 'Révision', 'Maintenance', 'Leasing', 'Permis', "Pièce d'identité", 'Sinistres', 'Budget']);
  // Colonnes : une par catégorie d'alerte
  const COLS = [
    { titre: 'Amendes',            icon: 'ticket',       color: 'text-rose-600',   match: a => a.categorie === 'Amendes' },
    { titre: 'Contrôle technique', icon: 'shield-check', color: 'text-red-600',    match: a => a.categorie === 'Contrôle technique' || a.categorie === 'Anti-pollution' },
    { titre: 'Révisions',          icon: 'wrench',       color: 'text-amber-600',  match: a => a.categorie === 'Révision' || a.categorie === 'Maintenance' },
    { titre: 'Leasing',            icon: 'file-text',    color: 'text-violet-600', match: a => a.categorie === 'Leasing' },
    { titre: 'Permis',             icon: 'id-card',      color: 'text-sky-600',    match: a => a.categorie === 'Permis' },
    { titre: "Pièce d'identité",   icon: 'contact',      color: 'text-teal-600',   match: a => a.categorie === "Pièce d'identité" },
    { titre: 'Sinistres',          icon: 'car-front',    color: 'text-orange-600', match: a => a.categorie === 'Sinistres' },
    { titre: 'Budget',             icon: 'piggy-bank',   color: 'text-emerald-600', match: a => a.categorie === 'Budget' },
    { titre: 'Autres',             icon: 'bell',         color: 'text-slate-600',  match: a => !CLAIMED.has(a.categorie) },
  ];

  function render() {
    const alerts = FP.buildAlertes(data);
    const cont = document.getElementById('notif-cols');
    cont.innerHTML = COLS.map((col, i) => {
      const list = alerts.filter(col.match);
      const body = list.map(notifHTML).join('') || '<p class="text-sm text-slate-400">Rien à signaler ✓</p>';
      return `<div>
        <h2 class="font-bold text-slate-900 mb-3 flex items-center gap-2">
          <i data-lucide="${col.icon}" class="w-5 h-5 ${col.color}"></i> ${col.titre}
          <span class="badge ${list.length ? 'badge-danger' : ''}" ${list.length ? '' : 'style="background:#E2E8F0;color:#475569"'}>${list.length}</span>
        </h2>
        <div class="space-y-2" id="col-${i}">${body}</div>
      </div>`;
    }).join('');
    renderMasquees();
    lucide.createIcons();
  }

  // Masquer une alerte (le bouton est hors du lien → on bloque la navigation par sécurité)
  document.getElementById('notif-cols').addEventListener('click', (e) => {
    const b = e.target.closest('[data-mute]'); if (!b) return;
    e.preventDefault(); e.stopPropagation();
    const card = b.parentElement.querySelector('.notif');
    const cat = card ? (card.querySelector('.notif-cat') || {}).textContent || '' : '';
    const msg = card ? (card.querySelector('.font-semibold') || {}).textContent || '' : '';
    const label = [cat, msg].filter(Boolean).join(' — ');
    FP.alertes.masquer(b.dataset.mute, label);
    render();
  });
  // Réafficher
  document.getElementById('notif-masquees').addEventListener('click', (e) => {
    if (e.target.closest('#unmute-all')) { FP.alertes.reafficherTout(); render(); return; }
    const u = e.target.closest('[data-unmute]'); if (!u) return;
    FP.alertes.reafficher(u.dataset.unmute); render();
  });

  // Sous-onglet « Renouvellements » embarqué (échéances CT/assurance/leasing/permis via FP.buildEcheances)
  function renderEcheances() {
    const box = document.getElementById('suivi-echeances'); if (!box) return;
    const ech = (FP.buildEcheances ? FP.buildEcheances(data) : []);
    if (!ech.length) { box.innerHTML = '<p class="text-sm text-slate-400">Aucune échéance à venir ✓</p>'; return; }
    const col = { danger: '#DC2626', warn: '#F59E0B', info: '#0e7490' };
    box.innerHTML = '<div class="space-y-2" style="max-width:780px">' + ech.map(e => {
      const c = col[e.niveau] || '#94a3b8';
      return `<a href="${esc(e.target || '#')}" class="notif lvl-${e.niveau}" style="text-decoration:none">
        <span style="width:9px;height:9px;border-radius:50%;background:${c};flex-shrink:0;margin-top:6px"></span>
        <div class="flex-1 min-w-0">
          <div class="notif-cat">${esc(e.categorie)}</div>
          <div class="font-semibold text-slate-900">${esc(e.label)}</div>
          ${e.detail ? `<div class="text-sm text-slate-500">${esc(e.detail)}</div>` : ''}
        </div>
        <div class="text-sm font-semibold self-center" style="color:${c};white-space:nowrap">${FP.dateNum ? FP.dateNum(e.date) : e.date}</div>
      </a>`;
    }).join('') + '</div>';
    lucide.createIcons();
  }
  // ===== Sous-onglet « À compléter » : TOUTES les infos manquantes de la plateforme =====
  const isEmptyV = (x) => x == null || String(x).trim() === '' || String(x).trim() === '—';
  function vehMasseEff(v) { try { const s = (FP.settings.get().vehMasse || {})[v.id]; if (s != null && String(s).trim() !== '') return s; } catch (e) {} try { return FP.masseCG && FP.masseCG(v); } catch (e) {} return null; }
  function leasingForfait(v) { try { const lo = (FP.getLeasingOverrides && FP.getLeasingOverrides()) || {}; const base = FP.LEASING_CONTRATS || {}; return lo[v.immat] || base[v.immat] || null; } catch (e) { return null; } }
  function estLeasing(v) { try { const prof = FP.societeProfil ? FP.societeProfil() : {}; const p = String(v.proprietaire || '').trim().toLowerCase(); if (p && prof.proprietaireLeasing && p === String(prof.proprietaireLeasing).trim().toLowerCase()) return true; } catch (e) {} return !!leasingForfait(v); }

  const VEH_FIELDS = [
    { k: 'immat', label: 'Immatriculation' }, { k: 'marque', label: 'Marque' }, { k: 'modele', label: 'Modèle' },
    { k: 'categorie', label: 'Catégorie' }, { k: 'carburant', label: 'Carburant' },
    { k: 'dateMiseEnCirculation', label: 'Date de 1re immat.' },
    { k: 'km', label: 'Kilométrage', empty: v => v.km == null || String(v.km).trim() === '' },
    { k: 'prochainCT', label: 'Prochain CT', skip: v => !!(FP.ctIgnored && FP.ctIgnored(v)) }, { k: 'proprietaire', label: 'Propriétaire' },
    { k: 'puissanceFiscale', label: 'Puissance fiscale' }, { k: 'vin', label: 'N° de châssis (VIN)' },
    { k: 'assurance', label: 'Assurance', val: v => v.assurance || (FP.assuranceLabel && FP.assuranceLabel()) },
    { k: 'co2', label: 'CO₂', skip: v => /lectri|hydrog/i.test(v.carburant || '') },
    { k: 'masse', label: 'Masse (carte grise)', val: v => vehMasseEff(v) },
    { k: 'leasing', label: 'Forfait leasing (km/durée)', skip: v => !estLeasing(v), empty: v => { const f = leasingForfait(v); return !f || isEmptyV(f.kmContrat) || isEmptyV(f.dureeMois) || isEmptyV(f.debut); } },
  ];
  const COND_FIELDS = [
    { k: 'nom', label: 'Nom' }, { k: 'prenom', label: 'Prénom' }, { k: 'dateNaissance', label: 'Date de naissance (âge)' },
    { k: 'poste', label: 'Poste' }, { k: 'tel', label: 'Téléphone' }, { k: 'email', label: 'Email' }, { k: 'adresse', label: 'Adresse' },
    { k: 'permisNumero', label: 'N° de permis' }, { k: 'permisExpiration', label: 'Expiration permis' },
  ];
  const AMENDE_FIELDS = [
    { k: 'prenom', label: 'Conducteur à attribuer' }, { k: 'montant', label: 'Montant' },
    { k: 'numeroAvis', label: "N° d'avis" }, { k: 'motif', label: 'Motif' }, { k: 'date', label: 'Date' },
  ];
  // Renvoie les champs manquants sous forme [{k,label}]. Si ignPrefix est fourni, on saute
  // les champs marqués « ignorés » (ex. véhicule étranger, moto sans CO₂/masse…) — persistant.
  const missOf = (x, fields, ignPrefix) => { const m = []; fields.forEach(f => { if (f.skip && f.skip(x)) return; if (ignPrefix && window.FP && FP.ignore && FP.ignore.has(ignPrefix + f.k)) return; const e = f.empty ? f.empty(x) : isEmptyV(f.val ? f.val(x) : x[f.k]); if (e) m.push({ k: f.k, label: f.label }); }); return m; };
  const compItem = (nom, miss, target, ignPrefix) => ({ nom, miss, target, ignPrefix: ignPrefix || '' });
  function sectionCompHTML(title, icon, items) {
    const n = items.length;
    const rows = items.map(it => `<div class="notif" style="align-items:flex-start">
        <div class="flex-1 min-w-0">
          <a href="${esc(it.target)}" class="font-semibold text-slate-900" style="text-decoration:none">${esc(it.nom)}</a>
          <div class="mt-1 flex flex-wrap gap-1">${it.miss.map(m => `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#FEF3C7;color:#92400E;padding:2px 4px 2px 8px;border-radius:9999px">${esc(m.label)}${it.ignPrefix ? `<button type="button" data-ign="${esc(it.ignPrefix + m.k)}" title="Ignorer — ne plus demander cette info (non concerné)" style="border:none;background:rgba(146,64,14,.15);color:#92400E;cursor:pointer;border-radius:9999px;width:16px;height:16px;line-height:1;font-size:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">✕</button>` : ''}</span>`).join('')}</div>
        </div>
        <a href="${esc(it.target)}" class="text-xs font-semibold self-center" style="color:var(--fp-accent);white-space:nowrap;text-decoration:none">Compléter →</a>
      </div>`).join('');
    return `<div class="mb-6"><h2 class="font-bold text-slate-900 mb-3 flex items-center gap-2"><i data-lucide="${icon}" class="w-5 h-5"></i> ${title} <span class="badge ${n ? 'badge-danger' : ''}" ${n ? '' : 'style="background:#E2E8F0;color:#475569"'}>${n}</span></h2>`
      + (n ? `<div class="space-y-2" style="max-width:840px">${rows}</div>` : `<p class="text-sm text-emerald-600">✓ Rien à compléter ici.</p>`) + `</div>`;
  }
  // Champs remplissables depuis les cartes grises (données pré-extraites dans FP.CG_DATA, par immat).
  const CG_APPLY_FIELDS = ['co2', 'puissanceFiscale', 'dateMiseEnCirculation', 'prochainCT', 'carburant'];
  function cgApplicableCount() {
    const cg = (window.FP && FP.CG_DATA) || {}; let n = 0;
    (data.vehicules || []).forEach(v => { const d = cg[String(v.immat || '').toUpperCase()]; if (!d) return; CG_APPLY_FIELDS.forEach(k => { if (d[k] != null && d[k] !== '' && isEmptyV(v[k])) n++; }); });
    return n;
  }
  function cgFillBanner() {
    const n = cgApplicableCount();
    if (!n) return '';
    return `<div class="mb-5 p-4 rounded-lg" style="background:#FFF7ED;border:1px solid #FED7AA">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div class="text-sm text-slate-700"><b>${n} info(s)</b> peuvent être remplies automatiquement depuis tes cartes grises.</div>
        <button id="cg-fill-btn" class="btn btn-dark text-sm"><i data-lucide="wand-2" class="w-4 h-4"></i> Compléter depuis les cartes grises</button>
      </div>
      <p id="cg-fill-status" class="text-xs text-slate-500 mt-2"></p>
    </div>`;
  }
  function renderComplet() {
    const box = document.getElementById('suivi-complet'); if (!box) return;
    const actifs = (data.vehicules || []).filter(v => !(FP.estVendu && FP.estVendu(v)));
    const vehItems = []; actifs.forEach(v => { const pfx = 'complet:veh:' + v.id + ':'; const m = missOf(v, VEH_FIELDS, pfx); if (m.length) vehItems.push(compItem(`${v.immat || '?'} · ${(v.marque || '')} ${(v.modele || '')}`.trim(), m, `vehicules.html?veh=${encodeURIComponent(v.id)}`, pfx)); });
    const conds = (data.conducteurs || []).filter(c => c && c.masque !== true && (c.manuel === true || !isEmptyV(c.nom) || !isEmptyV(c.prenom)));
    const condItems = []; conds.forEach(c => { const pfx = 'complet:cond:' + (c.key || '') + ':'; const m = missOf(c, COND_FIELDS, pfx); if (m.length) { const nom = [c.prenom, c.nom].filter(x => !isEmptyV(x)).join(' ') || c.name || c.key || 'Conducteur'; condItems.push(compItem(nom, m, `conducteurs.html?cond=${encodeURIComponent(c.key || '')}`, pfx)); } });
    const amItems = []; (data.amendes || []).forEach(a => { const pfx = 'complet:am:' + (a.id || '') + ':'; const m = missOf(a, AMENDE_FIELDS, pfx); if (m.length) amItems.push(compItem(`${(a.motif || 'Amende')} · ${a.date ? FP.date(a.date) : 'date ?'}`, m, `amendes.html?amende=${encodeURIComponent(a.id || '')}`, pfx)); });
    const cfg = [];
    try {
      const prof = FP.societeProfil ? FP.societeProfil() : {}; const soc = (FP.settings.get().societe) || {};
      if (FP.assuranceLabel && !FP.assuranceLabel()) cfg.push({ label: 'Assurance de la société non renseignée', target: 'contrats.html' });
      if (isEmptyV(prof.proprietaireLeasing) && actifs.some(estLeasing)) cfg.push({ label: 'Loueur de leasing non configuré', target: 'contrats.html' });
      if (isEmptyV(prof.mailExpediteur)) cfg.push({ label: "E-mail d'envoi des amendes non renseigné", target: 'parametres.html' });
      if (isEmptyV(soc.siret)) cfg.push({ label: 'SIRET de la société manquant', target: 'parametres.html' });
      if (isEmptyV(soc.adresse)) cfg.push({ label: 'Adresse de la société manquante', target: 'parametres.html' });
    } catch (e) {}
    const cfgHTML = cfg.length ? `<div class="mb-6"><h2 class="font-bold text-slate-900 mb-3 flex items-center gap-2"><i data-lucide="settings" class="w-5 h-5"></i> Configuration société <span class="badge badge-danger">${cfg.length}</span></h2><div class="space-y-2" style="max-width:840px">`
      + cfg.map(c => `<a href="${esc(c.target)}" class="notif" style="text-decoration:none"><div class="flex-1 min-w-0"><div class="font-semibold text-slate-900">${esc(c.label)}</div></div><span class="text-xs font-semibold self-center" style="color:var(--fp-accent);white-space:nowrap">Compléter →</span></a>`).join('') + `</div></div>` : '';
    const total = vehItems.length + condItems.length + amItems.length + cfg.length;
    const intro = total ? `<p class="text-sm text-slate-500 mb-5">${total} élément(s) à compléter. Clique sur une ligne pour aller la remplir directement.</p>`
      : `<p class="text-emerald-600 font-semibold mb-5">🎉 Tout est complet — aucune info manquante !</p>`;
    const nbIgn = (window.FP && FP.ignore && FP.ignore.countPrefix('complet:')) || 0;
    const restoreHTML = nbIgn ? `<p class="text-xs text-slate-400 mt-4">${nbIgn} info(s) marquée(s) « non concerné » et masquée(s) · <button type="button" id="complet-restore" style="color:var(--fp-accent);background:none;border:none;cursor:pointer;text-decoration:underline;font-size:12px">tout réafficher</button></p>` : '';
    box.innerHTML = intro + cgFillBanner() + cfgHTML
      + sectionCompHTML('Véhicules à compléter', 'car', vehItems)
      + sectionCompHTML('Conducteurs à compléter', 'users', condItems)
      + sectionCompHTML('Amendes à compléter', 'ticket', amItems)
      + restoreHTML;
    lucide.createIcons();
  }

  const tabA = document.getElementById('tab-alertes'), tabE = document.getElementById('tab-echeances'), tabC = document.getElementById('tab-complet');
  function showTab(which) {
    document.getElementById('notif-cols').classList.toggle('hidden', which !== 'alertes');
    document.getElementById('notif-masquees').classList.toggle('hidden', which !== 'alertes');
    document.getElementById('suivi-echeances').classList.toggle('hidden', which !== 'echeances');
    document.getElementById('suivi-complet').classList.toggle('hidden', which !== 'complet');
    [[tabA, 'alertes'], [tabE, 'echeances'], [tabC, 'complet']].forEach(([t, w]) => { if (!t) return; const on = w === which; t.style.borderBottomColor = on ? 'var(--fp-accent)' : 'transparent'; t.style.color = on ? 'var(--fp-primary)' : '#94A3B8'; });
    if (which === 'echeances') renderEcheances();
    if (which === 'complet') renderComplet();
  }
  if (tabA) tabA.addEventListener('click', () => showTab('alertes'));
  if (tabE) tabE.addEventListener('click', () => showTab('echeances'));
  if (tabC) tabC.addEventListener('click', () => showTab('complet'));

  // Bouton « Compléter depuis les cartes grises » : remplit les champs VIDES depuis FP.CG_DATA.
  document.getElementById('suivi-complet').addEventListener('click', async (e) => {
    // ✕ sur un tag → ignorer ce champ pour cet élément (persistant, par société)
    const ign = e.target.closest('[data-ign]');
    if (ign) { e.preventDefault(); e.stopPropagation(); if (window.FP && FP.ignore) { FP.ignore.set(ign.dataset.ign, true); renderComplet(); } return; }
    if (e.target.closest('#complet-restore')) { e.preventDefault(); if (window.FP && FP.ignore) { FP.ignore.clearPrefix('complet:'); renderComplet(); } return; }
    const b = e.target.closest('#cg-fill-btn'); if (!b) return;
    const cg = (window.FP && FP.CG_DATA) || {};
    const st = document.getElementById('cg-fill-status');
    b.disabled = true; if (st) { st.textContent = 'Mise à jour…'; st.style.color = '#64748B'; }
    let ok = 0, veh = 0;
    for (const v of (data.vehicules || [])) {
      const d = cg[String(v.immat || '').toUpperCase()]; if (!d) continue;
      const patch = {};
      CG_APPLY_FIELDS.forEach(k => { if (d[k] != null && d[k] !== '' && isEmptyV(v[k])) patch[k] = d[k]; });
      if (Object.keys(patch).length) {
        try { if (FP.persist && FP.persist.update) await FP.persist.update('vehicules', v.id, patch); Object.assign(v, patch); ok += Object.keys(patch).length; veh++; } catch (er) { console.warn(er); }
      }
    }
    if (st) { st.textContent = `✓ ${ok} info(s) remplies sur ${veh} véhicule(s).`; st.style.color = '#059669'; }
    renderComplet();
  });

  const isCompletVisible = () => !document.getElementById('suivi-complet').classList.contains('hidden');
  render();
  document.addEventListener('fp:data-ready', () => {
    render();
    if (!document.getElementById('suivi-echeances').classList.contains('hidden')) renderEcheances();
    if (isCompletVisible()) renderComplet();
  });

  // Charge les conducteurs (table à part) → alertes "permis qui expire" + onglet « À compléter »
  if (window.FP && FP.db && FP.db.select) {
    FP.db.select('conducteurs').then(r => {
      if (r && r.data) { data.conducteurs = r.data; render(); if (isCompletVisible()) renderComplet(); }
    }).catch(() => {});
  }
</script>
</body>
</html>
