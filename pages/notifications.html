  .notif { display: flex; gap: .75rem; align-items: flex-start; padding: .9rem 1rem; border-radius: .65rem; border: 1px solid var(--fp-border); background: white; text-decoration: none; transition: box-shadow .12s, transform .12s; }

  a.notif:hover { box-shadow: 0 10px 24px -12px rgba(15,30,61,.25); transform: translateY(-1px); }
  .notif.lvl-danger { border-left: 4px solid var(--fp-danger); }
  .notif.lvl-warn { border-left: 4px solid var(--fp-warn); }
  .notif.lvl-info { border-left: 4px solid #3B82F6; }
  .notif-cat { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--fp-muted); }
</style>
<script>
(function(){
  var remember = localStorage.getItem('fp_remember_me') === '1';
  var alive = sessionStorage.getItem('fp_session_alive') === '1';
  if (!remember && !alive) { localStorage.removeItem('sb-tzjuptlzoywjeigmyfuj-auth-token'); }
  sessionStorage.setItem('fp_session_alive', '1');
  var loginPath = window.location.pathname.indexOf('/pages/') !== -1 ? '../login.html' : 'login.html';
  var t; try { t = JSON.parse(localStorage.getItem('sb-tzjuptlzoywjeigmyfuj-auth-token')); } catch(e) {}
  if (!t || !t.access_token || (t.expires_at && t.expires_at * 1000 < Date.now())) { window.location.replace(loginPath); document.documentElement.style.display = 'none'; }
})();
</script>

    <script>/* Sidebar : reconstruit la barre dans son état final AVANT le 1er affichage
       (barre de recherche, ordre, visibilité, libellés perso, onglet actif). Sinon le JS
       fait tout ça APRÈS l'affichage → le menu "saute"/clignote. Autonome (localStorage). */
    (function(){try{
      var soc=(localStorage.getItem('fp_societe')||'PXP');if(soc==='__all__')soc='PXP';
      var raw=localStorage.getItem('auto_flotte_settings_'+soc);
      if(raw==null&&soc==='PXP')raw=localStorage.getItem('auto_flotte_settings');
      var s=raw?(JSON.parse(raw)||{}):{};
      var sb=document.querySelector('.fp-sidebar');if(!sb)return;
      var nav=sb.querySelector('nav');if(!nav)return;
      if(!sb.querySelector('.fp-global-search')){
        var w=document.createElement('div');w.className='fp-global-search';
        w.innerHTML='<div style="position: relative"><span style="position:absolute; left:.65rem; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.5); font-size:.85rem">\u{1F50D}</span><input type="text" class="fp-search-input" placeholder="Rechercher..." /></div><div class="fp-search-results"></div>';
        sb.insertBefore(w,nav);
      }
      var links=[].slice.call(nav.querySelectorAll('a[data-nav]'));if(!links.length)return;
      if(Array.isArray(s.navOrder)&&s.navOrder.length){
        var by={};links.forEach(function(a){by[a.dataset.nav]=a;});var ord=[];
        s.navOrder.forEach(function(k){if(by[k]){ord.push(by[k]);delete by[k];}});
        links.forEach(function(a){if(by[a.dataset.nav])ord.push(a);});
        ord.forEach(function(a){nav.appendChild(a);});}
      if(Array.isArray(s.navHidden)){var h={};s.navHidden.forEach(function(k){h[k]=1;});
        links.forEach(function(a){if(h[a.dataset.nav]&&a.dataset.nav!=='parametres.html')a.style.display='none';});}
      var lb=s.sidebarLabels||{};
      links.forEach(function(a){var t=lb[a.dataset.nav];if(!t)return;
        for(var i=0;i<a.childNodes.length;i++){var n=a.childNodes[i];if(n.nodeType===3&&n.textContent.trim()){n.textContent=' '+t;break;}}});
      var path=(location.pathname.split('/').pop()||'index').replace(/\.html$/,'');
      links.forEach(function(a){if((a.dataset.nav||'').replace(/\.html$/,'')===path)a.classList.add('active');});
    }catch(e){}})();</script>

  <main class="flex-1 p-6 md:p-10">

    <div class="mb-8">
      <h1 class="text-2xl font-extrabold" style="color: var(--fp-primary)">Notifications</h1>
      <p class="text-slate-500 text-sm mt-1">Le détail des alertes de ta flotte — ce qui demande ton attention.</p>
    </div>

    <div id="notif-cols" class="grid gap-6 md:grid-cols-2 xl:grid-cols-4"></div>

    <div id="notif-masquees" class="mt-8"></div>

<script src="../assets/js/vendor/supabase.js?v=20260626y"></script>
<script src="../assets/js/supabase-client.js?v=20260626y"></script>
<script src="../assets/js/data.js?v=20260626y"></script>
<script src="../assets/js/app.js?v=20260626y"></script>
<script>
  lucide.createIcons();
  const data = window.FP_DATA;

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

  function notifHTML(a) {
    const icon = a.niveau === 'danger' ? 'alert-triangle' : a.niveau === 'warn' ? 'bell' : 'info';
    const color = a.niveau === 'danger' ? 'text-red-600' : a.niveau === 'warn' ? 'text-amber-600' : 'text-blue-600';
    const tag = a.target ? 'a' : 'div';
    const href = a.target ? ` href="${esc(a.target)}"` : '';
    const arrow = a.target ? '<i data-lucide="chevron-right" class="w-4 h-4 text-slate-400 flex-shrink-0 self-center"></i>' : '';
    const card = `<${tag}${href} class="notif lvl-${a.niveau}">
      <i data-lucide="${icon}" class="w-5 h-5 ${color} flex-shrink-0 mt-0.5"></i>
      <div class="flex-1 min-w-0">
        ${a.categorie ? `<div class="notif-cat">${esc(a.categorie)}</div>` : ''}
        <div class="font-semibold text-slate-900">${esc(a.message)}</div>
        ${a.detail ? `<div class="text-sm text-slate-500 mt-0.5">${esc(a.detail)}</div>` : ''}
        ${a.vehicules && a.vehicules.length ? `<details class="mt-2">
          <summary class="text-xs font-semibold cursor-pointer" style="color:var(--fp-accent)">Voir les ${a.vehicules.length} véhicules</summary>
          <div class="mt-1 space-y-1">${a.vehicules.map(x => `<a href="${esc(x.target)}" class="block text-xs text-slate-600 hover:text-slate-900 hover:underline">• ${esc(x.label)}</a>`).join('')}</div>
        </details>` : ''}
      </div>
      ${arrow}
    </${tag}>`;
    // Alerte liée à un véhicule/échéance → bouton « Masquer » (en haut à droite, hors du lien)
    if (!a.muteKey) return card;
    return `<div style="position:relative">${card}
      <button type="button" data-mute="${esc(a.muteKey)}" title="Masquer cette alerte" class="absolute top-1.5 right-1.5 p-1 rounded-md text-slate-300 hover:text-red-600 hover:bg-red-50" style="background:rgba(255,255,255,.85)"><i data-lucide="bell-off" class="w-3.5 h-3.5"></i></button>
    </div>`;
  }

  function renderMasquees() {
    const box = document.getElementById('notif-masquees');
    const keys = (FP.alertes && FP.alertes.masquees()) || [];
    if (!keys.length) { box.innerHTML = ''; return; }
    const labels = (FP.alertes && FP.alertes.infos()) || {};
    box.innerHTML = `<details class="card p-4">
      <summary class="cursor-pointer font-semibold text-slate-700 flex items-center gap-2"><i data-lucide="bell-off" class="w-4 h-4 text-slate-400"></i> ${keys.length} alerte${keys.length > 1 ? 's' : ''} masquée${keys.length > 1 ? 's' : ''} <span class="text-xs font-normal text-slate-400">(cliquer pour gérer)</span></summary>
      <div class="mt-3 space-y-1.5">
        ${keys.map(k => `<div class="flex items-center justify-between gap-3 text-sm">
          <span class="text-slate-600 truncate">${esc(labels[k] || k)}</span>
          <button type="button" data-unmute="${esc(k)}" class="text-xs font-semibold shrink-0" style="color:var(--fp-accent)">Réafficher</button>
        </div>`).join('')}
        <button type="button" id="unmute-all" class="btn btn-outline text-xs mt-2">Tout réafficher</button>
      </div>
    </details>`;
    lucide.createIcons();
  }

  // Colonnes : une par catégorie d'alerte
  const COLS = [
    { titre: 'Amendes',            icon: 'ticket',       color: 'text-rose-600',   match: a => a.categorie === 'Amendes' },
    { titre: 'Contrôle technique', icon: 'shield-check', color: 'text-red-600',    match: a => a.categorie === 'Contrôle technique' || a.categorie === 'Anti-pollution' },
    { titre: 'Révisions',          icon: 'wrench',       color: 'text-amber-600',  match: a => a.categorie === 'Révision' || a.categorie === 'Maintenance' },
    { titre: 'Leasing',            icon: 'file-text',    color: 'text-violet-600', match: a => a.categorie === 'Leasing' },
    { titre: 'Permis',             icon: 'id-card',      color: 'text-sky-600',    match: a => a.categorie === 'Permis' },
  ];

  function render() {
    const alerts = FP.buildAlertes(data);
    const cont = document.getElementById('notif-cols');
    cont.innerHTML = COLS.map((col, i) => {
      const list = alerts.filter(col.match);
      const body = list.map(notifHTML).join('') || '<p class="text-sm text-slate-400">Rien à signaler ✓</p>';
      return `<div>
        <h2 class="font-bold text-slate-900 mb-3 flex items-center gap-2">
          <i data-lucide="${col.icon}" class="w-5 h-5 ${col.color}"></i> ${col.titre}
          <span class="badge ${list.length ? 'badge-danger' : ''}" ${list.length ? '' : 'style="background:#E2E8F0;color:#475569"'}>${list.length}</span>
        </h2>
        <div class="space-y-2" id="col-${i}">${body}</div>
      </div>`;
    }).join('');
    renderMasquees();
    lucide.createIcons();
  }

  // Masquer une alerte (le bouton est hors du lien → on bloque la navigation par sécurité)
  document.getElementById('notif-cols').addEventListener('click', (e) => {
    const b = e.target.closest('[data-mute]'); if (!b) return;
    e.preventDefault(); e.stopPropagation();
    const card = b.parentElement.querySelector('.notif');
    const cat = card ? (card.querySelector('.notif-cat') || {}).textContent || '' : '';
    const msg = card ? (card.querySelector('.font-semibold') || {}).textContent || '' : '';
    const label = [cat, msg].filter(Boolean).join(' — ');
    FP.alertes.masquer(b.dataset.mute, label);
    render();
  });
  // Réafficher
  document.getElementById('notif-masquees').addEventListener('click', (e) => {
    if (e.target.closest('#unmute-all')) { FP.alertes.reafficherTout(); render(); return; }
    const u = e.target.closest('[data-unmute]'); if (!u) return;
    FP.alertes.reafficher(u.dataset.unmute); render();
  });

  render();
  document.addEventListener('fp:data-ready', render);

  // Charge les conducteurs (table à part) pour générer les alertes "permis qui expire"
  if (window.FP && FP.db && FP.db.select) {
    FP.db.select('conducteurs').then(r => {
      if (r && r.data) { data.conducteurs = r.data; render(); }
    }).catch(() => {});
  }
</script>
