<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<title>Mon espace — Parc Pilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/tailwind.css?v=20260708e">
<script>window.lucide={createIcons:function(){}};</script>
<script defer src="../assets/js/lucide.min.js?v=20260708e"></script>
<script>addEventListener('DOMContentLoaded',function(){window.lucide&&window.lucide.createIcons&&lucide.createIcons();});</script>
<link rel="stylesheet" href="../assets/css/styles.css?v=20260708e">
<style>
  body { background:#f1f5f9; }
  .es-top { background:#0F1E3D; color:#fff; }
  .es-card { background:#fff; border:1px solid var(--fp-border); border-radius:16px; }
  .es-doc { position:relative; border:1px solid var(--fp-border); border-radius:12px; overflow:hidden; background:#fff; }
  .es-doc-prev { height:104px; background:#f1f5f9; display:flex; align-items:center; justify-content:center; }
  .es-doc-prev img { width:100%; height:100%; object-fit:cover; }
  .es-up { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; min-height:130px; border:2px dashed var(--fp-border); border-radius:12px; background:#fff; color:#64748b; cursor:pointer; font-weight:600; font-size:13px; }
  .es-up:hover { border-color:var(--fp-accent); color:var(--fp-primary); }
</style>
<script>
(function(){
  var remember = localStorage.getItem('fp_remember_me') === '1';
  var alive = sessionStorage.getItem('fp_session_alive') === '1';
  if (!remember && !alive) { localStorage.removeItem('sb-tzjuptlzoywjeigmyfuj-auth-token'); }
  sessionStorage.setItem('fp_session_alive', '1');
  var t; try { t = JSON.parse(localStorage.getItem('sb-tzjuptlzoywjeigmyfuj-auth-token')); } catch(e) {}
  if (!t || !t.access_token || (t.expires_at && t.expires_at * 1000 < Date.now())) { window.location.replace('../login.html'); document.documentElement.style.display = 'none'; }
})();
</script>
</head>
<body>

<div class="es-top px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <svg width="112" height="26" viewBox="0 0 154 36" xmlns="http://www.w3.org/2000/svg"><line x1="2" y1="10" x2="24" y2="10" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/><line x1="0" y1="18" x2="28" y2="18" stroke="#F97316" stroke-width="3" stroke-linecap="round"/><line x1="6" y1="26" x2="22" y2="26" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/><text x="34" y="26" font-size="20" font-weight="900" font-style="italic" fill="#fff">Parc</text><text x="86" y="26" font-size="20" font-weight="900" font-style="italic" fill="#F97316">Pilot</text></svg>
  </div>
  <button id="es-logout" class="text-sm text-white/80 hover:text-white flex items-center gap-1"><i data-lucide="log-out" class="w-4 h-4"></i> Quitter</button>
</div>

<main class="max-w-2xl mx-auto p-4 pb-16">
  <h1 class="text-xl font-extrabold text-slate-900 mb-1">Mon espace</h1>
  <p class="text-slate-500 text-sm mb-5">Retrouvez votre véhicule, ses échéances, et transmettez photos et documents (constat, sinistre…) à votre gestionnaire.</p>
  <div id="es-content"></div>
</main>

<input type="file" id="es-file" accept="image/*,application/pdf" multiple class="hidden">

<script src="../assets/js/vendor/supabase.js?v=20260708e"></script>
<script src="../assets/js/supabase-client.js?v=20260708e"></script>
<script src="../assets/js/data.js?v=20260708e"></script>
<script src="../assets/js/app.js?v=20260708e"></script>
<script>
  const $ = id => document.getElementById(id);
  const data = window.FP_DATA || { vehicules: [] };
  const normPl = s => String(s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  const isImg = u => /\.(jpe?g|png|gif|webp|heic|bmp)(\?|$)/i.test(u || '');
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  const immats = (window.FP && FP.chauffeurImmats) ? FP.chauffeurImmats() : [];
  let myDocs = [];       // documents (type sinistre-doc) de mes véhicules
  let uploadImmat = null; // véhicule ciblé par l'upload en cours

  function myVehicules() {
    const vs = data.vehicules || [];
    if (!immats.length) return [];
    return vs.filter(v => immats.some(p => normPl(p) === normPl(v.immat)));
  }
  function loadDocs() {
    if (!(window.FP && FP.db && FP.supabase)) { render(); return; }
    FP.db.select('documents').then(r => {
      if (!r.error) { myDocs = (r.data || []).filter(d => d.type === 'sinistre-doc' && immats.some(p => normPl(p) === normPl(d.vehiculeId))); render(); }
    }).catch(() => {});
  }
  function ctBadge(v) {
    const d = v.prochainCT; if (!d || d === '—') return '';
    const days = Math.ceil((new Date(d) - new Date()) / 86400000);
    const col = days < 0 ? '#DC2626' : days < 30 ? '#F59E0B' : '#10B981';
    const txt = days < 0 ? 'CT dépassé' : days < 60 ? `CT dans ${days} j` : 'CT à jour';
    return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:${col}"><span style="width:8px;height:8px;border-radius:50%;background:${col}"></span>${txt} · ${FP.dateNum ? FP.dateNum(d) : d}</span>`;
  }
  function render() {
    const box = $('es-content');
    const vs = myVehicules();
    if (!immats.length) {
      box.innerHTML = `<div class="es-card p-6 text-center"><div class="text-4xl mb-2">🚗</div><div class="font-bold text-slate-900">Aucun véhicule attribué</div><p class="text-sm text-slate-500 mt-1">Votre gestionnaire n'a pas encore associé de véhicule à votre compte. Contactez-le.</p></div>`;
      lucide.createIcons(); return;
    }
    box.innerHTML = vs.map(v => {
      const docs = myDocs.filter(d => normPl(d.vehiculeId) === normPl(v.immat));
      const docTiles = docs.map(d => {
        const u = esc(d.url || '');
        return `<div class="es-doc"><a href="${u}" target="_blank" rel="noopener" class="es-doc-prev">${isImg(d.url) ? `<img src="${u}" loading="lazy">` : `<i data-lucide="file-text" style="width:30px;height:30px;color:#64748b"></i>`}</a><div class="p-2 text-xs text-slate-600" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(d.label || '')}">${esc(d.label || 'fichier')}</div></div>`;
      }).join('');
      return `<div class="es-card p-5 mb-5">
        <div class="flex items-center justify-between gap-3 mb-2">
          <div>
            <div class="font-mono font-extrabold text-lg text-slate-900">${esc(v.immat || '—')}</div>
            <div class="text-sm text-slate-500">${esc((v.marque || '') + ' ' + (v.modele || '')).trim() || '—'}</div>
          </div>
          <div class="text-right">${ctBadge(v)}</div>
        </div>
        <div class="grid grid-cols-2 gap-3 my-3">
          <div class="bg-slate-50 rounded-xl p-3"><div class="text-xs text-slate-500">Kilométrage</div><div class="font-bold text-slate-900">${v.km != null ? FP.num(v.km) + ' km' : '—'}</div></div>
          <div class="bg-slate-50 rounded-xl p-3"><div class="text-xs text-slate-500">Carburant</div><div class="font-bold text-slate-900">${esc(v.carburant || '—')}</div></div>
        </div>
        <div class="text-xs font-bold uppercase tracking-wide text-slate-400 mt-4 mb-2">Photos & documents transmis</div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <button type="button" class="es-up" data-up="${esc(v.immat)}"><i data-lucide="camera" style="width:24px;height:24px"></i><span>Ajouter une photo<br>ou un document</span></button>
          ${docTiles}
        </div>
      </div>`;
    }).join('');
    lucide.createIcons();
  }

  async function doUpload(fileList) {
    const files = Array.from(fileList || []); if (!files.length || !uploadImmat) return;
    if (!(window.FP && FP.supabase && FP.uploadScan)) { alert("L'envoi nécessite une connexion internet."); return; }
    let ok = 0;
    for (const f of files) {
      try {
        const url = await FP.uploadScan(f, 'sinistres/' + normPl(uploadImmat));
        if (url) {
          const doc = { id: 'ES' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5), vehiculeId: uploadImmat, type: 'sinistre-doc', label: f.name, url, driveId: null };
          myDocs.push(doc); if (FP.persist) FP.persist.insert('documents', doc); ok++;
        }
      } catch (e) { console.error('[espace-salarie upload]', e); }
    }
    render();
    if (FP.toast) FP.toast(`${ok}/${files.length} fichier(s) transmis`); else alert(`${ok} fichier(s) transmis`);
  }

  $('es-content').addEventListener('click', (e) => {
    const up = e.target.closest('[data-up]');
    if (up) { uploadImmat = up.dataset.up; const inp = $('es-file'); if (inp) { inp.value = ''; inp.click(); } }
  });
  $('es-file').addEventListener('change', (e) => doUpload(e.target.files));
  $('es-logout').addEventListener('click', () => {
    try {
      if (window.FP && FP.auth && FP.auth.signOut) { FP.auth.signOut(); }
      localStorage.removeItem('sb-tzjuptlzoywjeigmyfuj-auth-token');
      localStorage.removeItem('fp_remember_me'); sessionStorage.removeItem('fp_session_alive');
    } catch (e) {}
    location.replace('../login.html');
  });

  render();
  loadDocs();
  document.addEventListener('fp:data-ready', () => { render(); loadDocs(); });
</script>
</body>
</html>
