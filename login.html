<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<title>Connexion — Parc Pilot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tailwind.css?v=20260626x">
<script>window.lucide={createIcons:function(){}};/* stub anti-erreur le temps que Lucide (defer, local) se charge */</script>
  <script defer src="assets/js/lucide.min.js?v=20260626x"></script>
  <script>addEventListener('DOMContentLoaded',function(){window.lucide&&window.lucide.createIcons&&lucide.createIcons();});</script>
<link rel="stylesheet" href="assets/css/styles.css?v=20260626x">
<style>
  body { background: linear-gradient(135deg, #111827 0%, #1F2937 55%, #F97316 145%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .login-card { background: white; border-radius: 1rem; box-shadow: 0 30px 80px -20px rgba(15,30,61,.5); padding: 2.5rem; max-width: 420px; width: 100%; }
  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-size: .85rem; font-weight: 600; color: var(--fp-text); margin-bottom: .4rem; }
  .field input { width: 100%; padding: .7rem .9rem; border: 1px solid var(--fp-border); border-radius: .55rem; font-size: .95rem; }
  .field input:focus { outline: none; border-color: var(--fp-accent); box-shadow: 0 0 0 3px rgba(249,115,22,.15); }
  .error-box { background: #FEF2F2; border: 1px solid #FECACA; color: #7F1D1D; padding: .65rem .85rem; border-radius: .55rem; font-size: .85rem; margin-bottom: 1rem; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-7">
      <div class="fp-logo text-2xl justify-center mb-4" style="color: var(--fp-primary)">
        <svg width="132" height="30" viewBox="0 0 154 36" xmlns="http://www.w3.org/2000/svg" aria-label="Parc Pilot" style="overflow:visible"><line x1="2" y1="10" x2="24" y2="10" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/><line x1="0" y1="18" x2="28" y2="18" stroke="#F97316" stroke-width="3" stroke-linecap="round"/><line x1="6" y1="26" x2="22" y2="26" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/><text x="34" y="26" font-size="20" font-weight="900" font-style="italic" fill="currentColor">Parc</text><text x="86" y="26" font-size="20" font-weight="900" font-style="italic" fill="#F97316">Pilot</text></svg>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900">Connexion</h1>
      <p class="text-sm text-slate-500 mt-1">Accède à ta flotte</p>
    </div>

    <div id="login-error" class="error-box hidden"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required placeholder="ton@email.com" />
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••" />
        <div class="text-right mt-1">
          <a href="#" id="forgot" class="text-xs font-semibold" style="color: var(--fp-accent)">Mot de passe oublié ?</a>
        </div>
      </div>
      <label class="flex items-center gap-2 mb-2 cursor-pointer text-sm text-slate-600">
        <input type="checkbox" id="remember-me" checked class="w-4 h-4 accent-teal-600" />
        <span>Se souvenir de moi (rester connecté)</span>
      </label>
      <label class="flex items-center gap-2 mb-5 cursor-pointer text-sm text-slate-600">
        <input type="checkbox" id="remember-pwd" class="w-4 h-4 accent-teal-600" />
        <span>Retenir mon mot de passe sur cet appareil</span>
      </label>
      <button type="submit" class="btn btn-dark w-full justify-center" id="btn-login">
        <i data-lucide="log-in" class="w-4 h-4"></i> Se connecter
      </button>
    </form>

    <p class="text-xs text-slate-500 mt-5 text-center">
      Pas encore de compte ? Contacte l'admin pour qu'il t'en crée un.
    </p>
  </div>

  <script src="assets/js/vendor/supabase.js?v=20260626x"></script>
  <script>
    const SUPABASE_URL = 'https://tzjuptlzoywjeigmyfuj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KC3TZ1zda-ja-0wkyjHUlg_aKohD6tq';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Petit (dé)brouillage pour ne pas stocker le mot de passe en clair évident
    const enc = (s) => { try { return btoa(unescape(encodeURIComponent(s))); } catch { return ''; } };
    const dec = (s) => { try { return decodeURIComponent(escape(atob(s))); } catch { return ''; } };

    // Pré-remplir l'email si "Se souvenir de moi" était activé la dernière fois
    const savedEmail = localStorage.getItem('fp_remember_email');
    const savedRemember = localStorage.getItem('fp_remember_me') === '1';
    if (savedEmail && savedRemember) {
      document.getElementById('email').value = savedEmail;
      document.getElementById('remember-me').checked = true;
    }
    // Pré-remplir le mot de passe s'il a été retenu sur cet appareil
    const savedPwd = localStorage.getItem('fp_remember_pwd');
    if (savedPwd) {
      document.getElementById('password').value = dec(savedPwd);
      document.getElementById('remember-pwd').checked = true;
    }

    // Lien "Mot de passe oublié ?" → envoie un email de réinitialisation
    document.getElementById('forgot').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { alert('Saisis d\'abord ton email ci-dessus, puis reclique sur « Mot de passe oublié ? ».'); return; }
      const { error } = await client.auth.resetPasswordForEmail(email, { redirectTo: window.location.href.split('#')[0].split('?')[0] });
      alert(error ? ('Erreur : ' + error.message) : ('Email de réinitialisation envoyé à ' + email + '.\nOuvre le lien dans le mail pour choisir un nouveau mot de passe.'));
    });

    // Retour depuis le lien de réinitialisation : on demande le nouveau mot de passe
    client.auth.onAuthStateChange(async (event) => {
      if (event === 'PASSWORD_RECOVERY') {
        const newPwd = prompt('Choisis ton nouveau mot de passe (6 caractères minimum) :');
        if (!newPwd) return;
        const { error } = await client.auth.updateUser({ password: newPwd });
        alert(error ? ('Erreur : ' + error.message) : 'Mot de passe mis à jour ✓ Tu peux maintenant te connecter.');
      }
    });

    // Si déjà connecté, redirige automatiquement vers le dashboard
    client.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('remember-me').checked;
      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Connexion...';
      lucide.createIcons();

      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message === 'Invalid login credentials'
          ? 'Email ou mot de passe incorrect'
          : (error.message || 'Erreur de connexion');
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4"></i> Se connecter';
        lucide.createIcons();
        return;
      }

      // Enregistre les préférences de mémorisation
      if (rememberMe) {
        localStorage.setItem('fp_remember_me', '1');
        localStorage.setItem('fp_remember_email', email);
      } else {
        localStorage.setItem('fp_remember_me', '0');
        localStorage.removeItem('fp_remember_email');
      }
      // Retenir (ou oublier) le mot de passe sur cet appareil
      if (document.getElementById('remember-pwd').checked) {
        localStorage.setItem('fp_remember_pwd', enc(password));
      } else {
        localStorage.removeItem('fp_remember_pwd');
      }
      // Marqueur de session active (sera vidé à la fermeture du browser)
      sessionStorage.setItem('fp_session_alive', '1');

      window.location.href = 'dashboard.html';
    });

    lucide.createIcons();
  </script>
</body>
</html>
