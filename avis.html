<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avis de contravention — Parc Pilot</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<style>body{font-family:Inter,system-ui,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0;color:#0F1E3D;background:#f8fafc}.box{text-align:center;padding:2rem}</style>
<script>
// Page de redirection : ouvre l'avis (PDF/photo) stocké, sans exposer l'URL technique dans le mail.
// Usage : avis.html?f=avis-6014854136.pdf  (eventuellement &d=avis pour le sous-dossier)
(function () {
  try {
    var q = new URLSearchParams(location.search);
    var f = q.get('f') || '';
    var d = q.get('d') || 'avis'; // sous-dossier du bucket "scans"
    // Sécurité : un simple nom de fichier (pas de chemin / traversée)
    if (!f || /[\/\\]/.test(f) || f.indexOf('..') !== -1 || !/^[a-z]+$/i.test(d)) return;
    var base = 'https://tzjuptlzoywjeigmyfuj.supabase.co/storage/v1/object/public/scans/';
    location.replace(base + d + '/' + f);
  } catch (e) {}
})();
</script>
</head>
<body>
  <div class="box">
    <p style="font-weight:700">Ouverture de l'avis de contravention…</p>
    <p style="color:#64748b;font-size:.9rem">Si rien ne se passe, vérifie le lien ou contacte l'expéditeur.</p>
  </div>
</body>
</html>
